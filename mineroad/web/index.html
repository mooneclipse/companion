<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- CSP: 同一オリジン + 和文フォント CDN のみ。inline script 不許可(外部 js)。
     style は Google Fonts の <link> 取得のため fonts.googleapis.com を許可、
     font 本体は fonts.gstatic.com。それ以外の外向きは塞ぐ。さぐりと同方針。 -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; object-src 'none'; base-uri 'none'">
<meta name="theme-color" content="#10131f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>マインロード</title>
<link rel="manifest" href="/mineroad/manifest.json">
<link rel="icon" href="/mineroad/icons/icon-192.png">
<!-- 和文 mincho。取得失敗時は style.css の serif フォールバックで成立する。 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500&display=swap">
<link rel="stylesheet" href="/mineroad/style.css">
</head>
<body>
<!-- 断面(タイル矩形 + fog + 自機 + 女の子)だけ canvas に焼く。
     文字・数値・ゲージ・ボタンは全て DOM。 -->
<canvas id="scene" aria-label="マインロード。地中を掘り進み二段ゲージを管理して女の子を地表へ連れ帰る"></canvas>

<!-- ゲーム HUD。上 = 深度/救出/探索率、その下 = 二段ゲージ(スタミナ+体力)。canvas の上に重ねる。 -->
<div id="hud" class="hud" hidden>
  <!-- 上部: 深度 + 救出数 + 探索率。 -->
  <section class="top-bar">
    <span id="depth-val" class="depth-val">深度 0 層</span>
    <span class="counts">
      <span class="count rescue"><span class="count-ico">救</span><span id="rescue-val">0</span></span>
      <span class="count explore"><span class="count-ico">探</span><span id="explore-val">0%</span></span>
      <button id="btn-mute" class="mute-btn" type="button" aria-label="音のオン／オフ">♪</button>
    </span>
  </section>

  <!-- 二段ゲージ(スタミナ → 体力)。横バー 2 段で視認。 -->
  <section class="gauge">
    <div class="gauge-row">
      <span class="gauge-cap">スタミナ</span>
      <div class="gauge-bar stamina-bar">
        <div id="stamina-fill" class="gauge-fill stamina-fill"></div>
      </div>
      <span id="stamina-val" class="gauge-val">100</span>
    </div>
    <div class="gauge-row">
      <span class="gauge-cap">体力</span>
      <div class="gauge-bar hp-bar">
        <div id="hp-fill" class="gauge-fill hp-fill"></div>
      </div>
      <span id="hp-val" class="gauge-val">30</span>
    </div>
  </section>

  <!-- v0.4.0 インベントリ: 鉱石 4 種 + 所持道具(ツルハシ段/回復薬)。アイコン+数値主体。 -->
  <section id="inventory" class="inventory">
    <span class="inv-ore cu"><span class="inv-ico">銅</span><span id="ore-cu">0</span></span>
    <span class="inv-ore fe"><span class="inv-ico">鉄</span><span id="ore-fe">0</span></span>
    <span class="inv-ore au"><span class="inv-ico">金</span><span id="ore-au">0</span></span>
    <span class="inv-ore di"><span class="inv-ico">ダ</span><span id="ore-di">0</span></span>
    <span class="inv-tool pick"><span class="inv-ico">ツ</span><span id="pick-ico">木</span></span>
    <button id="btn-potion" class="inv-btn" type="button" aria-label="回復薬を使う">薬 <span id="potion-val">0</span></button>
    <button id="btn-craft" class="inv-btn" type="button" aria-label="クラフトを開く">作る</button>
  </section>

  <!-- 下部ヒント(発見・スタミナ切れ・硬岩など)。 -->
  <div id="hud-hint" class="hud-hint" hidden></div>

  <!-- 操作: 十字キー(canvas 外 DOM、タップ掘りと併用)。pointer を拾う。 -->
  <section class="controls">
    <div class="dpad">
      <button id="btn-up" class="dpad-btn up" type="button" aria-label="上へ">▲</button>
      <button id="btn-left" class="dpad-btn left" type="button" aria-label="左を掘る">◀</button>
      <button id="btn-surface" class="dpad-btn center" type="button" aria-label="地表で全回復">回</button>
      <button id="btn-right" class="dpad-btn right" type="button" aria-label="右を掘る">▶</button>
      <button id="btn-down" class="dpad-btn down" type="button" aria-label="下を掘る">▼</button>
    </div>
  </section>
</div>

<!-- v0.4.0 クラフトオーバーレイ(craft.csv 6 レシピ)。dive 中に開ける。
     短高 viewport で破綻しないよう 2 段 flex(スクロール領域 + 固定フッター)。 -->
<div id="craft-overlay" class="craft-overlay" hidden>
  <div class="craft-panel">
    <h2 class="craft-title">クラフト</h2>
    <div id="craft-list" class="craft-list"></div>
    <button id="craft-close" class="craft-close" type="button">とじる</button>
  </div>
</div>

<!-- 各種オーバーレイ(title / howto / fail / clear)。hidden で完全非表示。 -->
<div id="overlay" class="overlay" hidden>
  <div class="panel">
    <h1 id="ov-title" class="ov-title" hidden></h1>
    <p id="ov-sub" class="ov-sub" hidden></p>
    <!-- あそびかた説明(初回自動 + title からいつでも再読)。縦並び・左寄せ。 -->
    <div id="ov-howto" class="ov-howto" hidden></div>
    <button id="ov-action" class="ov-action" type="button" hidden></button>
    <button id="ov-action2" class="ov-action ov-action2" type="button" hidden></button>
    <p id="ov-version" class="ov-version" hidden></p>
  </div>
</div>

<script src="/mineroad/tiles.js"></script>
<script src="/mineroad/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- CSP: 同一オリジンのみ。inline script/style 不許可(外部 app.js/style.css)、XSS 面を絞る -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; object-src 'none'; base-uri 'none'">
<meta name="theme-color" content="#1b1f2a">
<title>リモコン</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="glance" id="glance" role="button" tabindex="0" aria-label="接続状態と再生状況と OS health（タップで詳細）">
  <span class="dot" id="conn-dot" aria-hidden="true"></span>
  <span id="glance-now" class="now" hidden></span>
  <span id="glance-text">接続確認中…</span>
</header>

<main>
  <!-- トークン未設定 / 失効時 -->
  <section id="token-setup" class="card" hidden>
    <h2>トークン設定</h2>
    <p id="token-msg">SSH で発行したトークンを貼り付けてください。</p>
    <input type="password" id="token-input" autocomplete="off" inputmode="text" placeholder="トークン">
    <button id="token-save" type="button">保存</button>
  </section>

  <!-- 操作 -->
  <section id="app" hidden>
    <section class="card" id="video-card">
      <h2>動画</h2>

      <!-- idle: URL 投入。close≠stop ゆえ再生中でも「閉じる」でこの view に戻れる(TV 継続) -->
      <div id="video-idle">
        <!-- 「閉じる」で transport を畳んだが TV 再生継続中のとき、操作へ戻る導線 -->
        <button id="video-reopen" type="button" class="secondary" hidden>操作に戻る</button>
        <p id="video-ended" class="result" role="status" hidden></p>
        <textarea id="video-url" rows="2" maxlength="2000" placeholder="YouTube の URL"></textarea>
        <button id="video-play" type="button">再生</button>
        <p id="video-play-err" class="result" role="status"></p>
      </div>

      <!-- resolving: yt-dlp 解決中(40〜70秒)。経過秒 + 目安 + キャンセル -->
      <div id="video-resolving" hidden>
        <p class="resolving"><span class="spinner" aria-hidden="true"></span>
          <span id="video-resolve-text">読み込み中…</span></p>
        <p class="muted" id="video-resolve-note">読み込みに最大1分ほどかかります</p>
        <button id="video-cancel" type="button" class="secondary">キャンセル</button>
      </div>

      <!-- transport: 再生中 / 一時停止 -->
      <div id="video-transport" hidden>
        <p id="video-title" class="now-title"></p>
        <div id="video-seekrow" class="row">
          <input type="range" id="video-seek" min="0" max="100" value="0"
                 aria-label="再生位置">
          <span id="video-time" class="muted"></span>
        </div>
        <p id="video-live-badge" class="live-badge" hidden>● LIVE</p>
        <div class="row">
          <button id="video-toggle" type="button">一時停止</button>
        </div>
        <div class="row">
          <span class="muted vol-label">音量</span>
          <input type="range" id="video-volume" min="0" max="130" value="100"
                 aria-label="音量">
        </div>
        <!-- 「閉じる」(可逆・TV 継続)と「停止」(不可逆・破壊的)を語彙/位置で分離(§5.1) -->
        <div class="row video-bottom">
          <button id="video-close" type="button" class="secondary">閉じる</button>
          <button id="video-stop" type="button" class="danger">停止</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>発話</h2>
      <textarea id="say-text" rows="3" maxlength="2000" placeholder="しゃべらせるテキスト"></textarea>
      <div class="row">
        <input type="number" id="say-speaker" min="0" inputmode="numeric" placeholder="speaker(任意)">
        <button id="say-send" type="button">発話</button>
      </div>
      <p id="say-result" class="result" role="status"></p>
    </section>

    <section class="card" id="status-card" hidden>
      <h2>OS status</h2>
      <dl id="status-detail"></dl>
      <button id="status-refresh" type="button">更新</button>
    </section>
  </section>
</main>

<script src="/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>NowPlaying</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&family=Noto+Sans+JP:wght@500;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden;background:#0a0c12;font-family:'Hanken Grotesk','Noto Sans JP',sans-serif;color:#fff}
#bg{position:absolute;inset:-8%;animation:npDriftB 150s ease-in-out infinite;filter:blur(95px) saturate(.74) brightness(.42)}
#bg-inner{width:100%;height:100%;background:radial-gradient(ellipse 70% 60% at 30% 40%,#5566b0,transparent),radial-gradient(ellipse 50% 50% at 70% 60%,#34407a,transparent)}
#overlay{position:absolute;inset:0;background:linear-gradient(105deg,rgba(10,12,18,.92) 30%,rgba(10,12,18,.45) 60%,rgba(10,12,18,.3))}
#content{position:absolute;inset:90px;animation:npOrbit 220s ease-in-out infinite;display:flex;flex-direction:column}
#clock{align-self:flex-end;font-size:36px;font-weight:500;color:rgba(255,255,255,.5);margin-bottom:auto}
#main{display:flex;align-items:center;gap:96px;flex:1}
#art-wrap{width:600px;height:600px;flex-shrink:0;border-radius:14px;overflow:hidden;box-shadow:0 8px 60px rgba(0,0,0,.5)}
#art{width:100%;height:100%;object-fit:cover;display:block}
#art-placeholder{width:100%;height:100%;background:linear-gradient(135deg,#34407a,#5566b0);display:none}
#info{flex:1;min-width:0;display:flex;flex-direction:column;gap:24px}
#label{font-size:26px;font-weight:800;letter-spacing:.22em;color:rgba(255,255,255,.35);text-transform:uppercase}
#title{font-size:124px;font-weight:700;line-height:1.05;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
#artist{font-size:50px;font-weight:500;color:rgba(255,255,255,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#progress-wrap{width:760px;margin-top:16px}
#bar-bg{width:100%;height:5px;background:rgba(255,255,255,.13);border-radius:3px;position:relative}
#bar-fill{height:100%;background:#7d8fd6;border-radius:3px;width:0%;box-shadow:0 0 12px rgba(125,143,214,.5)}
#times{display:flex;justify-content:space-between;margin-top:10px;font-size:24px;font-weight:500;color:rgba(255,255,255,.4)}
#idle-screen{position:absolute;inset:0;background:#0a0c12;display:none;z-index:10}
@keyframes npOrbit{0%{transform:translate(0,0)}25%{transform:translate(5px,3px)}50%{transform:translate(2px,6px)}75%{transform:translate(-4px,2px)}100%{transform:translate(0,0)}}
@keyframes npDriftB{0%{transform:scale(1.16) translate(0,0)}50%{transform:scale(1.22) translate(1.2%,-.8%)}100%{transform:scale(1.16) translate(0,0)}}
</style>
</head>
<body>
<div id="bg"><div id="bg-inner"></div></div>
<div id="overlay"></div>
<div id="content">
  <div id="clock"></div>
  <div id="main">
    <div id="art-wrap">
      <img id="art" alt="">
      <div id="art-placeholder"></div>
    </div>
    <div id="info">
      <div id="label">Now Playing</div>
      <div id="title"></div>
      <div id="artist"></div>
      <div id="progress-wrap">
        <div id="bar-bg"><div id="bar-fill"></div></div>
        <div id="times"><span id="elapsed">0:00</span><span id="total">0:00</span></div>
      </div>
    </div>
  </div>
</div>
<div id="idle-screen"></div>
<script>
(function(){
  var elClock = document.getElementById("clock");
  var elTitle = document.getElementById("title");
  var elArtist = document.getElementById("artist");
  var elArt = document.getElementById("art");
  var elPlaceholder = document.getElementById("art-placeholder");
  var elBarFill = document.getElementById("bar-fill");
  var elElapsed = document.getElementById("elapsed");
  var elTotal = document.getElementById("total");
  var elIdle = document.getElementById("idle-screen");

  var lastArtUrl = "";

  function fmt(sec) {
    if (sec == null || sec < 0) return "0:00";
    var s = Math.floor(sec);
    var m = Math.floor(s / 60);
    s = s % 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  function extractVideoId(path) {
    if (!path) return null;
    var m = path.match(/[?&]v=([A-Za-z0-9_-]{11})/);
    if (m) return m[1];
    m = path.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
    if (m) return m[1];
    return null;
  }

  function stripTopic(name) {
    if (!name) return "";
    return name.replace(/\s*-\s*Topic$/, "");
  }

  function updateClock() {
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();
    elClock.textContent = h + ":" + (m < 10 ? "0" : "") + m;
  }

  function update(data) {
    if (data.phase === "idle") {
      elIdle.style.display = "block";
      return;
    }
    elIdle.style.display = "none";

    elTitle.textContent = data.title || "";

    var artistText = "";
    if (data.artist) {
      artistText = data.artist;
    } else if (data.uploader) {
      artistText = stripTopic(data.uploader);
    }
    elArtist.textContent = artistText;

    var vid = extractVideoId(data.path);
    var artUrl = vid ? "https://i.ytimg.com/vi/" + vid + "/hqdefault.jpg" : "";
    if (artUrl !== lastArtUrl) {
      lastArtUrl = artUrl;
      if (artUrl) {
        elArt.src = artUrl;
        elArt.style.display = "block";
        elPlaceholder.style.display = "none";
        elArt.onerror = function() {
          elArt.style.display = "none";
          elPlaceholder.style.display = "block";
        };
      } else {
        elArt.style.display = "none";
        elPlaceholder.style.display = "block";
      }
    }

    var pos = data.pos || 0;
    var dur = data.duration || 0;
    var pct = dur > 0 ? Math.min(100, (pos / dur) * 100) : 0;
    elBarFill.style.width = pct + "%";
    elElapsed.textContent = fmt(pos);
    elTotal.textContent = fmt(dur);
  }

  function poll() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "/api/video/np", true);
    xhr.timeout = 4000;
    xhr.onload = function() {
      if (xhr.status === 200) {
        try { update(JSON.parse(xhr.responseText)); } catch(e) {}
      }
    };
    xhr.send();
  }

  updateClock();
  setInterval(updateClock, 1000);
  poll();
  setInterval(poll, 2000);
})();
</script>
</body>
</html>

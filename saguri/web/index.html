<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- CSP: 同一オリジン + 和文フォント CDN のみ。inline script 不許可(外部 js)。
     style は Google Fonts の <link> 取得のため fonts.googleapis.com を許可、
     font 本体は fonts.gstatic.com。それ以外の外向きは塞ぐ。ともる/あかりと同方針。 -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; object-src 'none'; base-uri 'none'">
<meta name="theme-color" content="#10131f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>さぐり</title>
<link rel="manifest" href="/saguri/manifest.json">
<link rel="icon" href="/saguri/icons/icon-192.png">
<!-- 和文 mincho。取得失敗時は style.css の serif フォールバックで成立する。 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500&display=swap">
<link rel="stylesheet" href="/saguri/style.css">
</head>
<body>
<!-- 断面(タイル + 手がかり数字なし=数字は DOM chip / 自機 / 女の子 / 光の道)だけ canvas に焼く。
     文字・手がかり数字 chip・スタミナバー・気配メーター・救出数は全て DOM。 -->
<canvas id="scene" aria-label="さぐり。明るい断面で危険を読み女の子を地上へ護衛する掘削デドゥース"></canvas>

<!-- 手がかり数字 chip 層(canvas 外 DOM)。掘って露出した未掘削タイル面の周囲落盤数を焼かず DOM で重ねる。 -->
<div id="clue-layer" class="clue-layer" hidden></div>

<!-- ゲーム HUD。上 = 深度/救出数、左縦 = スタミナバー、上右 = 気配メーター。canvas の上に重ねる。 -->
<div id="hud" class="hud" hidden>
  <!-- 上部: 深度 + 救出数 + 同行数。 -->
  <section class="top-bar">
    <span id="depth-val" class="depth-val">深度 0 層</span>
    <span class="counts">
      <span class="count rescue"><span class="count-ico">救</span><span id="rescue-val">0</span></span>
      <span class="count escort"><span class="count-ico">同</span><span id="escort-val">0</span></span>
    </span>
  </section>

  <!-- 気配メーター(最寄りの女の子への方向 + 距離ヒート)。上右に置く。 -->
  <section class="sense-meter">
    <span class="sense-cap">気配</span>
    <span id="sense-arrow" class="sense-arrow">・</span>
    <span id="sense-heat" class="sense-heat">気配なし</span>
  </section>

  <!-- 左縦: スタミナバー。 -->
  <section class="stamina-rail">
    <span class="stamina-cap">力</span>
    <div class="stamina-bar">
      <div id="stamina-fill" class="stamina-fill"></div>
    </div>
    <span id="stamina-val" class="stamina-val">80</span>
  </section>

  <!-- 下部ヒント(落盤・救出・道具など)。 -->
  <div id="hud-hint" class="hud-hint" hidden></div>

  <!-- 操作: 十字キー + 印ボタン(canvas 外 DOM、タップ掘り/長押し印と併用)。pointer を拾う。 -->
  <section class="controls">
    <div class="dpad">
      <button id="btn-up" class="dpad-btn up" type="button" aria-label="上を掘る">▲</button>
      <button id="btn-left" class="dpad-btn left" type="button" aria-label="左を掘る">◀</button>
      <button id="btn-flag" class="dpad-btn center" type="button" aria-label="となりに印をつける">印</button>
      <button id="btn-right" class="dpad-btn right" type="button" aria-label="右を掘る">▶</button>
      <button id="btn-down" class="dpad-btn down" type="button" aria-label="下を掘る">▼</button>
    </div>
    <!-- 道具ボタン(取得済みの道具を 1 タップで使う。未取得時は hidden)。 -->
    <div id="tool-bar" class="tool-bar" hidden>
      <button id="btn-tool-ladder" class="tool-btn" type="button" hidden aria-label="ハシゴで上がる">ハシゴ</button>
      <button id="btn-tool-sensor" class="tool-btn" type="button" hidden aria-label="センサで落盤を見る">センサ</button>
    </div>
  </section>
</div>

<!-- 各種オーバーレイ(title / howto / shop / fail / clear / fragment)。hidden で完全非表示。 -->
<div id="overlay" class="overlay" hidden>
  <div class="panel">
    <h1 id="ov-title" class="ov-title" hidden></h1>
    <p id="ov-sub" class="ov-sub" hidden></p>
    <!-- あそびかた説明(初回自動 + title からいつでも再読)。縦並び・左寄せ。 -->
    <div id="ov-howto" class="ov-howto" hidden></div>
    <!-- 救出ごとの断章(1 行・補助)。 -->
    <p id="ov-fragment" class="ov-fragment" hidden></p>
    <!-- 基地ショップの在庫(救出ポイント)表示。 -->
    <div id="ov-stock" class="ov-stock" hidden></div>
    <!-- 基地ショップ: 全強化を縦リスト一覧 → ポイントが足りるものを買い切り購入。 -->
    <div id="ov-upgrades" class="ov-upgrades shop-list" hidden></div>
    <button id="ov-action" class="ov-action" type="button" hidden></button>
    <button id="ov-action2" class="ov-action ov-action2" type="button" hidden></button>
    <p id="ov-version" class="ov-version" hidden></p>
  </div>
</div>

<script src="/saguri/tiles.js"></script>
<script src="/saguri/upgrades.js"></script>
<script src="/saguri/fragments.js"></script>
<script src="/saguri/app.js"></script>
</body>
</html>
